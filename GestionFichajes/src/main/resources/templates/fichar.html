<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fichar - Gestor de horarios</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>
  <main class="app-shell">
    <header class="browser-top">
      <div class="browser-icons" aria-hidden="true">
        <button class="icon-btn">←</button>
        <button class="icon-btn">→</button>
        <button class="icon-btn">×</button>
        <button class="icon-btn">⌂</button>
      </div>
      <div class="url-bar">https://migestordehorariosyfichajes.com/fichar</div>
    </header>

    <section class="workspace">
      <div class="top-tools">
        <a th:href="@{/index}" class="menu-toggle" style="text-decoration: none;">← Volver al inicio</a>
        <div style="font-weight: bold;">
            Reloj: <span id="reloj-digital">00:00:00</span>
        </div>
        <button class="help-btn">?</button>
      </div>

      <div class="content-grid" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
        
        <article class="notification-card" style="max-width: 500px; width: 100%; text-align: center; padding: 40px;">
	       <div th:if="${mensajeExito}"> ✅ <span th:text="${mensajeExito}"></span></div>
	  	   <div th:if="${mensajeError}"> ⚠️ <span th:text="${mensajeError}"></span></div>
          <h2 style="font-size: 1.8rem; margin-bottom: 10px;">Control de Jornada</h2>
          <p style="color: #666; margin-bottom: 30px;">
            Hola, <span th:text="${usuario.nombre}" style="font-weight: bold; color: #333;">Empleado</span>.<br>
            Registra tu entrada o salida a continuación.
          </p>

          <div th:if="${enJornada}">
            <div style="background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                🟢 Actualmente estás en tu puesto de trabajo.<br>
                <small>Entrada registrada a las: <span th:text="${#temporals.format(ultimoFichaje.fechaEntrada, 'HH:mm')}">08:00</span></small>
            </div>
            <form th:action="@{/fichar/registrar-salida}" method="post">
                <button type="submit" class="yes" style="background: #dc3545; width: 100%; font-size: 1.2rem;">
                    ⏹️ Registrar Salida
                </button>
            </form>
          </div>

          <div th:unless="${enJornada}">
            <div style="background: #f5f5f5; color: #666; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                ⚪ No has iniciado jornada todavía.
            </div>
            <form th:action="@{/fichar/registrar-entrada}" method="post">
                <button type="submit" class="yes" style="background: #28a745; width: 100%; font-size: 1.2rem;">
                    ▶️ Registrar Entrada
                </button>
            </form>
          </div>

        </article>
      </div>
    </section>
  </main>

  <script>
    // Reloj en tiempo real
    setInterval(() => {
        const now = new Date();
        document.getElementById('reloj-digital').innerText = now.toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
