<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Crear Calendario Laboral</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="bg-light">

	<div class="container mt-5">
		<div class="card shadow">
			<div class="card-header bg-primary text-white">
				<h3 class="mb-0">Nuevo Calendario Laboral</h3>
			</div>
			<div class="card-body">
				<form th:action="@{/admin/guardar_calendario}" th:object="${calendario}"
					method="post">

					<div class="row mb-4">
						<div class="col-md-8">
							<label class="form-label">Nombre del Calendario</label> <input
								type="text" th:field="*{nombre}" class="form-control"
								placeholder="Ej: Calendario Madrid 2026" required>
						</div>
						<div class="col-md-4">
							<label class="form-label">Año</label> <input type="number"
								th:field="*{anyo}" class="form-control" value="2026" required>
						</div>
					</div>

					<hr>

					<div class="d-flex justify-content-between align-items-center mb-3">
						<h4>Festivos</h4>
						<button type="button" class="btn btn-success btn-sm"
							onclick="agregarFestivo()">+ Añadir Festivo</button>
					</div>

					<table class="table table-bordered" id="tablaFestivos">
						<thead class="table-secondary">
							<tr>
								<th>Fecha</th>
								<th>Descripción</th>
								<th style="width: 50px;">Acción</th>
							</tr>
						</thead>
						<tbody id="contenedorFestivos">
						</tbody>
					</table>
					<div class="mt-2 text-muted">
						<strong>Total de festivos configurados: </strong> <span
							id="contadorVisual" class="badge bg-info text-dark">0</span>
					</div>
					<div class="mt-4 text-end">
						<a th:href="@{/admin/calendarios_laborales}" class="btn btn-secondary">Cancelar</a>
						<button type="submit" class="btn btn-primary">Guardar
							Calendario</button>
					</div>
				</form>
			</div>
		</div>
	</div>
<script th:src="@{/calendarios_laborales.js}"></script>
</body>
</html>
