<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Nuevo Calendario - Panel Admin</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

	<link rel="stylesheet" th:href="@{/styles.css}" />
</head>

<body th:data-home="@{/admin/index}">
	<main class="app-shell">
		<section class="workspace">

			<div class="top-tools">
				<button class="menu-toggle" id="menuToggle">☰ Panel Admin ▾</button>
				<div style="margin-left: 10px; font-weight: bold; color: #2c3e50;">
					🛠️ Modo Administrador: <span th:text="${usuario != null ? usuario.nombre : 'Admin'}">Admin</span>
				</div>
				<div class="search-area">
					<span>🔍</span> <input type="text" placeholder="Buscar..." aria-label="buscar" />
				</div>
				<button class="help-btn">?</button>
			</div>

			<div class="content-grid">

				<section class="left-zone">

					<div id="logo-amarsa" style="text-align: center; margin-bottom: 20px;">
						<img th:src="@{/logo.png}" alt="Logo" class="brand-logo" />
					</div>
					<div class="menu-wrap">
						<ul id="mainMenu" class="menu-dropdown" style="display: block; list-style: none; padding: 0;">
							<li><a th:href="@{/admin/calendarios_laborales}"
									style="padding: 12px; display: block; text-decoration: none; color: inherit;">⬅️
									Volver</a></li>
							<li><a th:href="@{/admin/gestion}"
									style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">
									👥 Gestión de Empleados </a></li>
							<li style="border-left: 4px solid #007bff;">
								<a th:href="@{/admin/calendarios_laborales}"
									style="text-decoration: none; color: #007bff; display: block; padding: 12px; font-weight: 700;">
									🗓️ Calendarios Laborales </a>
							</li>
							<li><a th:href="@{/convenio}"
									style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">
									📜 Convenio Laboral </a></li>
							<li>
								<a th:href="@{/admin/asignar_ausencia}"
									style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">
									Bajas y Permisos
								</a>
							</li>
							<li><a th:href="@{/logout}"
									style="text-decoration: none; color: #dc3545; display: block; padding: 12px; border-top: 1px solid #eee; margin-top: 10px;">
									🚪 Cerrar Sesión </a></li>
						</ul>
					</div>
				</section>

				<section class="main-content" style="margin-top: 9%;">
					<div class="card shadow border-0">
						<div class="card-header bg-primary text-white py-3">
							<h4 class="mb-0">
								<i class="bi bi-calendar-plus"></i> Configurar Nuevo Calendario
							</h4>
						</div>
						<div class="card-body p-4">
							<form th:action="@{/admin/guardar_calendario}" th:object="${calendario}" method="post">

								<input type="hidden" th:field="*{id}" />

								<div class="row mb-4">
									<div class="col-md-8">
										<label class="form-label fw-bold">Nombre del
											Calendario</label> <input type="text" th:field="*{nombre}"
											class="form-control" placeholder="Ej: Calendario Madrid 2026" required />
									</div>
									<div class="col-md-4">
										<label class="form-label fw-bold">Año</label> <input type="number"
											th:field="*{anyo}" class="form-control" required />
									</div>
								</div>

								<div class="d-flex justify-content-between align-items-center mb-3 mt-4">
									<h5 class="text-secondary mb-0">Días Festivos</h5>
									<button type="button" class="btn btn-success btn-sm" onclick="agregarFestivo()">
										<i class="bi bi-plus-lg"></i> Añadir Festivo
									</button>
								</div>

								<div class="table-responsive">
									<table class="table table-bordered align-middle" id="tablaFestivos">
										<thead class="table-light">
											<tr>
												<th>Fecha</th>
												<th>Descripción del Festivo</th>
												<th style="width: 80px;" class="text-center">Acción</th>
											</tr>
										</thead>
										<tbody id="contenedorFestivos">
											<tr th:each="fest : ${calendario.festivos}">
												<td>
													<input type="hidden" class="festivo-id" th:value="${fest.id}" />
													<input type="date" class="festivo-fecha form-control"
														th:value="${fest.fecha}" required />
												</td>
												<td>
													<input type="text" class="festivo-descripcion form-control"
														th:value="${fest.descripcion}" placeholder="Nombre del festivo"
														required />
												</td>
												<td class="text-center">
													<button type="button" class="btn btn-danger"
														onclick="eliminarFila(this)">×</button>
												</td>
											</tr>
										</tbody>
									</table>
								</div>

								<div class="mt-2 text-muted small">
									<strong>Total configurados: </strong> <span id="contadorVisual"
										class="badge bg-info text-dark">0</span>
								</div>

								<div class="mt-5 pt-3 border-top text-end">
									<a th:href="@{/admin/calendarios_laborales}" class="btn btn-light px-4 me-2">
										Cancelar </a>
									<button type="submit" class="btn btn-primary px-4">
										<i class="bi bi-save"></i> Guardar Calendario
									</button>
								</div>
							</form>
						</div>
					</div>
				</section>

			</div>
		</section>
	</main>

	<script th:src="@{/common.js}"></script>
	<script th:src="@{/calendarios_laborales.js}"></script>
</body>

</html>
