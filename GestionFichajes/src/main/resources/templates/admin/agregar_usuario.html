<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Agregar usuario nuevo - Gestor</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" th:href="@{/styles.css}" />
	<style>
		.back-button-container {
			margin: 10px 0 20px 20px;
			text-align: left;
			color: black;
		}

		.btn-back {
			background-color: #1976d2;
			color: rgb(0, 0, 0);
			padding: 10px 20px;
			border-radius: 8px;
			text-decoration: none;
			font-weight: 700;
			display: inline-flex;
			align-items: center;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
			transition: background-color 0.3s;
		}

		.btn-back:hover {
			background-color: #1565c0;
		}

		.btn-back span {
			margin-right: 8px;
		}

		#rol {
			padding: 6px;
			border-radius: 10px;
			background-color: #1976d2;
			color: #020101;
			font-weight: 700;
		}

		#calendario {
			padding: 6px;
			border-radius: 10px;
			background-color: #1976d2;
			color: #020101;
			font-weight: 700;
		}
	</style>
</head>

<body th:data-home="@{/admin/index}">

	<main class="app-shell">

		<section class="workspace">
			<div class="top-tools">
				<button class="menu-toggle">☰ Menú ▾</button>
				<h1 class="management-title">Agregar usuario nuevo</h1>
				<div style="margin-left: 15px; font-weight: 600;">
					Usuario: <span th:text="${usuario.nombre}">Nombre Admin</span>
				</div>
			</div>
			<div class="back-button-container">
				<a th:href="@{/admin/listado_usuarios}" class="btn-back">
					<span>⬅</span> Listado de usuarios
				</a>
			</div>
			<div class="content-grid">
				<section class="left-zone">
					<div class="menu-wrap">
						<ul id="mainMenu" class="menu-dropdown" style="display: block;">
							<li data-submenu="subMenu_gestion">

								<a th:href="@{/admin/index}"
									style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">
									Inicio
								</a>
							</li>
							<li>
								<a th:href="@{/admin/listado_usuarios}"
									style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">
									👥 Gestión de Empleados
								</a>
							</li>

							<li>
								<a th:href="@{/admin/calendarios_laborales}"
									style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">
									🗓️ Calendarios Laborales
								</a>
							</li>

							<li>
								<a th:href="@{/convenio}"
									style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">
									📜 Convenio Laboral
								</a>
							</li>
							<li>
								<a th:href="@{/admin/asignar_ausencia}"
									style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">
									Bajas y Permisos
								</a>
							</li>

							<li>
								<a th:href="@{/admin/informes}"
									style="text-decoration: none; color: inherit; display: block; padding: 12px;">
									📊 Informes y Horas
								</a>
							</li>

							<li>
								<a th:href="@{/logout}"
									style="text-decoration: none; color: #dc3545; display: block; padding: 12px; border-top: 1px solid #eee; margin-top: 10px;">
									🚪 Cerrar Sesión
								</a>
							</li>
						</ul>
					</div>
				</section>
				<section class="form-wrapper" style="flex: 1;">

					<div th:if="${error}"
						style="background-color: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ffcdd2; font-weight: bold; display: flex; align-items: center; gap: 10px;">
						<span>⚠️</span> <span th:text="${error}"></span>
					</div>

					<form class="worker-form" th:action="@{/admin/empleados/guardar}" th:object="${nuevoEmpleado}"
						method="post" onsubmit="return confirm('¿Estás seguro de que deseas guardar el registro?');">

						<input type="hidden" th:field="*{id}" readonly
							style="background-color: #eee; cursor: not-allowed;" th:if="${nuevoEmpleado.id != null}" />

						<label for="nombre">Nombre</label>
						<input type="text" id="nombre" th:field="*{nombre}" required />
						<div th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"
							style="color: #c62828; font-size: 0.85rem; font-weight: 800; margin-top: 4px;"></div>

						<label for="email">Correo electrónico</label>
						<input type="email" id="email" th:field="*{email}" required placeholder="ejemplo@gmail.com"
							autocomplete="off" />
						<div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
							style="color: #c62828; font-size: 0.85rem; font-weight: 800; margin-top: 4px;"></div>

						<label for="password">Contraseña</label>
						<input type="password" id="password" th:field="*{password}"
							th:required="${nuevoEmpleado.id == null}"
							th:placeholder="${nuevoEmpleado.id == null ? 'Escriba la contraseña para el nuevo usuario' : 'Dejar en blanco para mantener la actual'}"
							autocomplete="new-password">
						<div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
							style="color: #c62828; font-size: 0.85rem; font-weight: 800; margin-top: 4px;"></div>

						<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
							<div>
								<label for="rol" style="margin-top: 0;">Rol del empleado</label>
								<select id="rol" th:field="*{rol}" required>
									<option value="">Seleccione un rol...</option>
									<option value="ADMINISTRADOR">Administrador</option>
									<option value="EMPLEADO">Empleado</option>
								</select>
								<div th:if="${#fields.hasErrors('rol')}" th:errors="*{rol}"
									style="color: #c62828; font-size: 0.85rem; font-weight: 800; margin-top: 4px;">
								</div>
							</div>

							<div>
								<label for="calendario" style="margin-top: 0;">Calendario Laboral</label>
								<select id="calendario" th:field="*{calendario}" required>
									<option value="">Seleccione un calendario...</option>
									<option th:each="cal : ${listaCalendarios}" th:value="${cal.id}"
										th:text="${cal.nombre + ' (' + cal.anyo + ')'}">
										Calendario 2026</option>
								</select>
								<div th:if="${#fields.hasErrors('calendario')}" th:errors="*{calendario}"
									style="color: #c62828; font-size: 0.85rem; font-weight: 800; margin-top: 4px;">
								</div>
							</div>
						</div>

						<div style="margin-top: 30px; display: flex; gap: 10px;">
							<button type="submit"
								th:text="${nuevoEmpleado.id == null ? 'Agregar Usuario' : 'Guardar Cambios'}"></button>
							<a th:href="@{/admin/gestion}" class="btn-secondary"
								style="text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 8px; background: #fff; color: #333; border: 2px solid #3f3a34; flex: 1; font-weight: 800;">Cancelar</a>
						</div>
					</form>
				</section>
			</div>
		</section>
	</main>
	<script th:src="@{/common.js}" defer></script>
</body>

</html>
