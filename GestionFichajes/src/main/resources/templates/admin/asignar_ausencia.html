<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Asignar Ausencias Oficiales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/styles.css}" />
    <style>
        .alerts-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 20px auto;
        }

        .alert-custom {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .alert-icon {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        .alert-success-custom {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .alert-error-custom {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
    </style>
</head>



<body th:data-home="@{/admin/index}">
    <main class="app-shell">
        <section class="workspace">

            <div class="top-tools"
                style="display: flex; align-items: center; justify-content: center; position: relative;">
                <h1 class="management-title" style="color: rgb(255, 255, 255); margin: 0;">Asignar Bajas y Permisos</h1>
                <div style="position: absolute; right: 20px; font-weight: 600; color: rgb(255, 255, 255);">
                    Usuario: <span th:text="${usuario.nombre}">Gestor Principal</span>
                </div>
            </div>

            <div id="logo-amarsa">
                <img th:src="@{/logo.png}" alt="Logo del gestor" class="brand-logo" />
            </div>

            <div class="content-grid">
                <section class="left-zone">
                    <div class="menu-wrap">
                        <ul id="mainMenu" class="menu-dropdown" style="display: block;">
                            <li><a th:href="@{/admin/listado_usuarios}"
                                    style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">👥
                                    Gestión de Empleados</a></li>
                            <li><a th:href="@{/admin/calendarios_laborales}"
                                    style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">🗓️
                                    Calendarios Laborales</a></li>
                            <li><a th:href="@{/convenio}"
                                    style="text-decoration: none; color: inherit; display: block; padding: 12px; font-weight: 600;">📜
                                    Convenio Laboral</a></li>
                            <li style="border-left: 4px solid #007bff; background-color: #f8f9fa;"><a
                                    th:href="@{/admin/asignar_ausencia}"
                                    style="text-decoration: none; color: #007bff; display: block; padding: 12px; font-weight: 800;">Bajas
                                    y Permisos</a></li>
                            <li><a th:href="@{/logout}"
                                    style="text-decoration: none; color: #dc3545; display: block; padding: 12px; border-top: 1px solid #eee; margin-top: 10px;">🚪
                                    Cerrar Sesión</a></li>
                        </ul>
                    </div>
                </section>

                <section class="right-zone"
                    style="flex: 1; display: flex; flex-direction: column; align-items: center;">

                    <div class="alerts-container">
                        <div th:if="${success}" class="alert-custom alert-success-custom">
                            <span class="alert-icon">✅</span> <span th:text="${success}"></span>
                        </div>
                        <div th:if="${error}" class="alert-custom alert-error-custom">
                            <span class="alert-icon">⚠️</span> <span th:text="${error}"></span>
                        </div>
                    </div>

                    <div class="card shadow-sm"
                        style="width: 100%; max-width: 800px; border: 3px solid #3f3a34; border-radius: 12px; overflow: hidden;">
                        <div
                            class="card-header bg-dark text-white d-flex justify-content-between align-content-center py-3">
                            <h5 class="mb-0">💼 Panel de Gestión: Asignar Bajas y Permisos</h5>
                            <a th:href="@{/admin/calendarios_laborales}" class="btn btn-sm btn-outline-light">Volver a
                                Calendarios</a>
                        </div>
                        <div class="card-body p-4">
                            <form th:action="@{/admin/ausencias/guardar}" method="post">

                                <!-- Selector de Empleado -->
                                <div class="mb-3">
                                    <label for="empleadoId" class="form-label fw-bold">Seleccionar Empleado</label>
                                    <select id="empleadoId" name="empleadoId" class="form-select" required>
                                        <option value="" disabled selected>-- Selecciona un trabajador de la plantilla
                                            --
                                        </option>
                                        <option th:each="emp : ${empleados}" th:value="${emp.id}"
                                            th:text="${emp.nombre}">
                                        </option>
                                    </select>
                                </div>

                                <div class="row">
                                    <!-- Fecha de Inicio -->
                                    <div class="col-md-6 mb-3">
                                        <label for="fechaInicio" class="form-label fw-bold">Fecha de Inicio</label>
                                        <input type="date" id="fechaInicio" name="fechaInicio" class="form-control"
                                            required>
                                    </div>
                                    <!-- Fecha de Fin -->
                                    <div class="col-md-6 mb-3">
                                        <label for="fechaFin" class="form-label fw-bold">Fecha de Fin</label>
                                        <input type="date" id="fechaFin" name="fechaFin" class="form-control" required>
                                    </div>
                                </div>

                                <!-- Tipo de Ausencia -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tipo de Ausencia Administrativa</label>
                                    <div class="d-flex gap-4 mt-1">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="tipo" id="tipoBaja"
                                                value="BAJA_MEDICA" checked>
                                            <label class="form-check-label text-danger fw-semibold" for="tipoBaja">
                                                🔴 Baja Médica
                                            </label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="tipo" id="tipoPermiso"
                                                value="PERMISO_RETRIBUIDO">
                                            <label class="form-check-label text-primary fw-semibold" for="tipoPermiso">
                                                🔵 Permiso Retribuido / Justificado
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <!-- Observaciones / Motivo -->
                                <div class="mb-4">
                                    <label for="observaciones" class="form-label fw-bold">Observaciones / Justificación
                                        Interna</label>
                                    <textarea id="observaciones" name="observaciones" rows="3" class="form-control"
                                        placeholder="Ej: Baja por contingencias comunes, justificantes médicos aportados, etc."></textarea>
                                </div>

                                <!-- Botón de Envío -->
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-dark btn-lg fs-6 fw-bold">Registrar y Grabar en
                                        Calendario</button>
                                </div>

                            </form>
                        </div>
                    </div>
				</section>
            </div>
            <script th:src="@{/common.js}"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        </section>
	</main>
</body>

</html>
