<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Gestión de Solicitudes - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/styles.css}" />
    <style>
    /* Asegura que el contenedor padre mantenga el layout de 3 columnas */
    .content-grid {
        display: grid !important;
        grid-template-columns: 220px minmax(0, 1fr) 300px !important;
        gap: 20px !important;
        align-items: start !important;
    }

    /* Fuerza a que las tablas no se expandan más allá de su celda */
    #mainContent {
        min-width: 0 !important; /* IMPORTANTE: Permite que el grid encoja este div */
        padding: 20px !important;
    }

    /* Evita que los formularios o tablas fuercen anchos inesperados */
    #mainContent table {
        width: 100% !important;
        table-layout: auto; 
    }
    
    * Elimina el margen superior del primer H2 */
    h2:first-child {
        margin-top: 0 !important;
        padding-top: 0 !important;
    }

    h2 + div {
        margin-top: 0px !important; 
    }

    /* Asegura que mainContent no tenga un padding superior excesivo */
    #mainContent {
        padding-top: 10px !important; /* Ajusta este valor para subirlo más o menos */
    }
    .workspace {
        padding-top: 5px !important;
    }

    /* 2. Elimina el margen superior de los títulos h2 */
    h2 {
        margin-top: 0 !important;
        margin-bottom: 10px !important;
    }

    /* 3. Asegura que el mainContent empiece desde arriba */
    #mainContent {
        padding-top: 0 !important;
    }

</style>
</head>

<body>
    <main class="app-shell">
        <section class="workspace">
            <div class="top-tools">
                <button id="menuToggle" class="menu-toggle">☰ Menú ▾</button>
                <div style="margin-left: 15px; font-weight: 600;">Administrador: <span th:text="${usuario.nombre}"></span></div>
            </div>
            
            <div id="logo-amarsa">
				<img th:src="@{/logo.png}" alt="Logo del gestor" class="brand-logo" />
			</div>

            <div class="content-grid">
                <section class="left-zone">
                    <div class="menu-wrap">
                        <ul id="mainMenu" class="menu-dropdown">
                            <li data-submenu="none"><a th:href="@{/index}"
								style="text-decoration: none; color: inherit;">Inicio</a></li>
							<li><a th:href="@{/asignar_horario}" style="text-decoration: none; color: inherit;">Horario Personal</a></li>
							<li><a th:href="@{/asignar_horario}" style="text-decoration: none; color: inherit;">Horario Equipo</a></li>							
							<li><a th:href="@{/gestion_plantillas}" style="text-decoration: none; color: inherit;">Plantillas Horario</a></li>
					        <li><a th:href="@{/vacaciones/calendario-global}" style="text-decoration: none; color: inherit;">Ausencias Equipo</a></li>
					        <li class="active-menu">Solicitudes</li>
							
							<li><a th:href="@{/logout}"
								style="color: red; text-decoration: none;">Salir</a></li>
                        </ul>
                    </div>
                </section>

                <div id="mainContent">
    
				    <h2>Correcciones de Fichajes</h2>
				    <div th:each="s : ${fichajes}" style="margin-bottom: 20px; background: white; border: 1px solid #eee; border-radius: 12px; padding: 15px;">
				        <table style="width: 80%; border-collapse: collapse;">
				            <tr>
				                <td><strong>Empleado:</strong> <span th:text="${s.fichaje.empleado.nombre}"></span></td>
				                <td><strong>Fecha:</strong> <span th:text="${#temporals.format(s.fichaje.fechaEntrada, 'dd/MM/yyyy')}"></span></td>
				                <td><strong>Propuesta:</strong> <span th:text="${s.horaEntradaPropuesta} + ' a ' + ${s.horaSalidaPropuesta}"></span></td>
				                <td>
				                    <form th:action="@{/solicitudes/procesar}" method="post" style="display: flex; gap: 5px;">
				                        <input type="hidden" name="id" th:value="${s.id}" />
				                        <button type="submit" name="accion" value="APROBAR">Aprobar</button>
				                        <button type="submit" name="accion" value="RECHAZAR">Rechazar</button>
				                    </form>
				                </td>
				            </tr>
				        </table>
				    </div>
				
				    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #ddd;">
				
				    <h2>Cambios de Turno Futuro</h2>
				    <div th:each="s : ${turnos}" style="margin-bottom: 20px; background: white; border: 1px solid #eee; border-radius: 12px; padding: 15px;">
				        <table style="width: 100%; border-collapse: collapse;">
				            <tr>
				                <td><strong>Empleado:</strong> <span th:text="${s.empleado.nombre}"></span></td>
				                <td><strong>Fecha Turno:</strong> <span th:text="${#temporals.format(s.fechaTurno, 'dd/MM/yyyy')}"></span></td>
				                <td><strong>Propuesta:</strong> <span th:text="${s.horaEntradaPropuesta} + ' a ' + ${s.horaSalidaPropuesta}"></span></td>
				                <td>
				                    <form th:action="@{/solicitudes/procesar}" method="post">
									    <input type="hidden" name="id" th:value="${s.id}" />
									    
									    <button type="submit" name="accion" value="APROBAR">Aprobar</button>
									    <button type="submit" name="accion" value="RECHAZAR">Rechazar</button>
									</form>
				                </td>
				            </tr>
				        </table>
				    </div>
				    
				</div>
                <aside class="calendar-panel">
				    <div class="calendar-head">
				        <strong id="yearText">2026</strong> 
				        <span id="dateText"></span> </div>
				    <div class="calendar-body">
				        <div class="month-bar">
				            <button id="prevMonth" aria-label="mes anterior">‹</button>
				            <span id="monthLabel">MARCH 2026</span>
				            <button id="nextMonth" aria-label="mes siguiente">›</button>
				        </div>
				        <div class="weekdays" id="weekdays"></div>
				        <div class="days-grid" id="daysGrid"></div>
				    </div>
				    <div class="calendar-actions">
				        <button class="cancel">CANCEL</button>
				        <button class="ok">OK</button>
				    </div>
				</aside>
            </div>
            
            
        </section>
    </main>
    <script th:src="@{/app.js}"></script>
</body>
</html>
