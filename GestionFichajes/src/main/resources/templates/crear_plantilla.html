<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Plantilla Horario - Panel Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" th:href="@{/styles.css}" />

    <style>
        #calendar {
            max-width: 100%;
            margin: 20px 0;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .form-wrapper {
            max-width: 1100px; 
            width: 100%;
        }
        
        .content-grid {
            display: flex !important;
            gap: 20px !important;
            align-items: flex-start !important; 
            margin-top: 15px !important;
        }

        .left-zone, .main-content, .form-wrapper, .card {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
    </style>
</head>
<body th:data-home="@{/index}">
    <main class="app-shell">
        <section class="workspace p-4">
            
            <div class="top-tools mb-3">
                <button class="menu-toggle" id="menuToggle">☰ Panel Admin ▾</button>
                <div style="margin-left: 10px; font-weight: bold; color: #2c3e50;">
                    Usuario: <span th:text="${usuario?.nombre}">Admin</span>
                </div>
                <button class="help-btn" onclick="abrirAyuda()" style="margin-left:auto; margin-right:15px; cursor:pointer;">?</button>
            </div>

            <div id="logo-amarsa">
				<img th:src="@{/logo.png}" alt="Logo" class="brand-logo" />
			</div>

            <div class="content-grid">
                
                <section class="left-zone">
                    <div class="menu-wrap">
                        <ul id="mainMenu" class="menu-dropdown">
							<li data-submenu="none"><a th:href="@{/index}"
								style="text-decoration: none; color: inherit;">Inicio</a></li>
							<li data-submenu="none"><a th:href="@{/horario_personal}"
								style="text-decoration: none; color: inherit;">Horario Personal</a></li>
							<li><a th:href="@{/asignar_horario}" style="text-decoration: none; color: inherit;">Horarios Equipo</a></li>
							<li class="active-menu">Plantillas Horario</li>
								
							<li data-submenu="none"><a th:href="@{/vacaciones/calendario-global}"
								style="text-decoration: none; color: inherit;">Equipo</a></li>
								<li><a th:href="@{/solicitudes}" style="text-decoration: none; color: inherit;">Solicitudes</a></li>
							<li><a th:href="@{/logout}"
								style="color: red; text-decoration: none;">Salir</a></li>
						</ul>
                    </div>
                </section>

                <section class="main-content flex-grow-1">
                    <div class="form-wrapper">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
                                <h4 class="mb-0"><i class="bi bi-clock-history"></i> Configurar Plantilla de Horario</h4>
                                <a th:href="@{/gestion_plantillas}" class="btn btn-outline-light btn-sm fw-bold px-3">
                                    <i class="bi bi-arrow-left-short"></i> Volver al Listado
                                </a>
                            </div>
                            <div class="card-body p-4">
                                <form th:action="@{/plantillas/guardar}" th:object="${plantilla}" method="post">
                                    
                                    <div class="row mb-4">
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold">Nombre de la Plantilla</label>
                                            <input type="text" th:field="*{nombrePlantilla}" class="form-control" placeholder="Ej: Turno Mañana Oficinas" required>
                                        </div>
                                    </div>

                                    <hr>
                                    
                                    <h5>Definición Visual del Horario</h5>
                                    <p class="text-muted small">Haz clic y arrastra sobre el calendario para definir las horas de trabajo.</p>
                                    
                                    <div id="calendar"></div>

                                    <input type="hidden" id="datosHorarioJSON" name="datosHorarioJSON">

                                    <div class="mt-4 pt-3 border-top d-flex justify-content-between">
                                        <button type="button" class="btn btn-outline-danger" onclick="limpiarCalendario()">
                                            <i class="bi bi-trash"></i> Limpiar todo
                                        </button>
                                        <div>
                                            <a th:href="@{/gestion_plantillas}" class="btn btn-light me-2">Cancelar</a>
                                            <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                                <i class="bi bi-check-circle"></i> Guardar Plantilla
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script th:src="@{/common.js}"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek', 
                locale: 'es',
                firstDay: 1, 
                allDaySlot: false,
                slotMinTime: "06:00:00",
                slotMaxTime: "22:00:00",
                editable: true,
                selectable: true,
                selectMirror: true,
                dayHeaderFormat: { weekday: 'long' },
                height: '600px',
                headerToolbar: {
                    left: '',
                    center: '',
                    right: ''
                },
                select: function(arg) {
                    var title = "Horario Laboral";
                    if (title) {
                        calendar.addEvent({
                            title: title,
                            start: arg.start,
                            end: arg.end,
                            allDay: arg.allDay,
                            backgroundColor: '#0d6efd',
                            borderColor: '#0a58ca'
                        });
                    }
                    calendar.unselect();
                    actualizarDatosOcultos();
                },
                eventClick: function(arg) {
                    if (confirm('¿Eliminar este bloque de horario?')) {
                        arg.event.remove();
                        actualizarDatosOcultos();
                    }
                }
            });
            calendar.render();

            function actualizarDatosOcultos() {
                const eventos = calendar.getEvents().map(e => ({
                    start: e.start,
                    end: e.end
                }));
                document.getElementById('datosHorarioJSON').value = JSON.stringify(eventos);
            }
        });

        function limpiarCalendario() {
            if(confirm("¿Seguro que quieres borrar todo el horario diseñado?")) {
                location.reload(); 
            }
        }
    </script>
</body>
</html>
