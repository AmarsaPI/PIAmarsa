<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de horarios y fichajes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" th:href="@{/styles.css}" />
</head>

<body>
  <main class="app-shell">
    <header class="browser-top">
      <div></div>
    </header>

    <section class="workspace">
      <div class="top-tools">
        <button id="menuToggle" class="menu-toggle">☰ Menú ▾</button>

        <div style="margin-left: 10px; font-weight: bold;">
          Hola, <span th:text="${usuario.nombre}">Usuario</span>
        </div>

        <div class="search-area">
          <span>🔍</span>
          <input type="text" placeholder="search" aria-label="buscar" />
        </div>
        <button class="help-btn">?</button>
      </div>

      <img th:src="@{/logo.png}" alt="Logo del gestor" class="brand-logo" />

      <div class="content-grid">
        <section class="left-zone">
          <div class="menu-wrap">
            <ul id="mainMenu" class="menu-dropdown">
              <li>
                <a th:href="@{/fichar(auth=${usuario.id})}"
                  style="text-decoration: none; color: inherit; display: block; padding: 10px;">
                  ⏱️ Fichar
                </a>
              </li>

              <li>
                <a th:href="@{/horario_personal}"
                  style="text-decoration: none; color: inherit; display: block; padding: 10px;">
                  📅 Horario
                </a>
              </li>

              <li>
                <a th:href="@{/vacaciones}"
                  style="text-decoration: none; color: inherit; display: block; padding: 10px;">
                  🏖️ Vacaciones y permisos
                </a>
              </li>

              <li>
                <a th:href="@{/perfil}" style="text-decoration: none; color: inherit; display: block; padding: 10px;">
                  👤 Perfil
                </a>
              </li>
              <li>
                <a th:href="@{/gestion}" style="text-decoration: none; color: inherit; display: block; padding: 10px;">
                  🛠️ Gestión
                </a>
              </li>
              <li>
                <a th:href="@{/logout}"
                  style="text-decoration: none; color: #dc3545; display: block; padding: 10px; border-top: 1px solid #eee;">
                  🚪 Logout
                </a>
              </li>
            </ul>
          </div>

          <article class="notification-card">
            <h2>Notificaciones</h2>
            <p>Bienvenido al sistema,<br /> <span th:text="${usuario.nombre}">Nombre</span></p>
            <div class="choice-row">
              <button class="no">No</button>
              <button class="yes">Sí</button>
            </div>
          </article>
        </section>

        <aside class="calendar-panel">
          <div class="calendar-head">
            <strong id="yearText">2026</strong>
            <span id="dateText" th:text="${#dates.format(#dates.createNow(), 'E, MMM dd')}">Thu, Mar 05</span>
          </div>
          <div class="calendar-body">
            <div class="month-bar">
              <button id="prevMonth" aria-label="mes anterior">‹</button>
              <span id="monthLabel">MARZO 2026</span>
              <button id="nextMonth" aria-label="mes siguiente">›</button>
            </div>
            <div class="weekdays" id="weekdays"></div>
            <div class="days-grid" id="daysGrid"></div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script th:src="@{/app.js}"></script>
</body>

</html>
