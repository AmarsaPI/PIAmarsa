<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Horario - Gestor de horarios y fichajes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" th:href="@{/styles.css}" />
    <link rel="stylesheet" th:href="@{/horario.css}" />
</head>

<body>
    <main class="app-shell">
        <header class="browser-top">
            <div></div>
        </header>

        <section class="workspace">
            <div class="top-tools">
                <button id="menuToggle" class="menu-toggle">☰ Menú ▾</button>
                <div style="margin-left: 15px; font-weight: 600;">
                    Usuario: <span th:text="${usuario.nombre}">Nombre Apellido</span>
                </div>
                <div class="search-area">
                    <span>🔍</span>
                    <input type="text" placeholder="search" />
                </div>
                <button class="help-btn">?</button>
            </div>

            <img th:src="@{/logo.png}" alt="Logo" class="brand-logo" />

            <div class="content-grid">
                <section class="left-zone">
                    <div class="menu-wrap">
                        <ul id="mainMenu" class="menu-dropdown">
                            <li><a th:href="@{/index}">Inicio</a></li>
                            <li class="active-menu">Horario</li>
                            <li>
						        <a th:href="@{/vacaciones}" style="text-decoration: none; color: inherit; display: block; padding: 10px;">
						            🏖️ Vacaciones y permisos
						        </a>
						    </li>
                            <li>Perfil</li>
                            <li><a th:href="@{/logout}" style="color: red;">Salir</a></li>
                        </ul>
                    </div>

                    <article class="notification-card">
                        <h2>Notificaciones</h2>
                        <p>No tienes avisos<br />pendientes hoy.</p>
                        <div class="choice-row">
                            <button class="no">Cerrar</button>
                            <button class="yes">Ver más</button>
                        </div>
                    </article>
                </section>

                <aside class="schedule-panel">
                    <div class="schedule-head">
                        <h2>Mi Horario Semanal</h2>
                        <span class="date-range" th:text="${rangoSemana}">Semana actual</span>
                    </div>

                    <div class="schedule-body">
                        <table class="schedule-table">
                            <thead>
                                <tr>
                                    <th>Día</th>
                                    <th>Entrada</th>
                                    <th>Salida</th>
                                    <th>Descanso</th>
                                    <th>Total Hrs</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="h : ${horarios}">
                                    <td><strong th:text="${h.diaSemana}">Día</strong></td>
                                    <td th:text="${h.horaInicio}">00:00</td>
                                    <td th:text="${h.horaFin}">00:00</td>
                                    
                                </tr>
                                
                                <tr th:if="${#lists.isEmpty(horarios)}">
                                    <td colspan="6" style="text-align: center; padding: 20px;">
                                        No hay horarios asignados para esta semana.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="schedule-actions">
                        <button class="btn-secondary">Exportar PDF</button>
                        <button class="btn-primary">Solicitar Cambio</button>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script th:src="@{/common.js}"></script>
</body>
</html>
