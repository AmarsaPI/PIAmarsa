<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agregar usuario nuevo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app-shell management-shell">
    <header class="browser-top">

    </header>

    <section class="workspace management-page">
      <div class="top-tools">
        <a class="menu-toggle" href="gestion.html">← Volver a gestión</a>
        <h1 class="management-title">Agregar usuario nuevo</h1>
        <span></span>
      </div>

      <section class="form-wrapper">
        <form class="worker-form" action="#" method="post">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required />

          <label for="apellidos">Apellidos</label>
          <input type="text" id="apellidos" name="apellidos" required />

          <label for="dni">DNI/NIE</label>
          <input type="text" id="dni" name="dni" required />

          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" required />

          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" required />

          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" name="direccion" required />

          <label for="puesto">Puesto</label>
          <input type="text" id="puesto" name="puesto" required />

          <label for="fechaAlta">Fecha de alta</label>
          <input type="date" id="fechaAlta" name="fechaAlta" required />

          <button type="submit">Guardar trabajador</button>
        </form>
      </section>
    </section>
  </main>
</body>

</html>
