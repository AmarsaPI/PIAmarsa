<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de horarios y fichajes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app-shell">
    <header class="browser-top">
      <img src="logo.png" alt="Logo del gestor" class="brand-logo" />
    </header>

    <section class="workspace">
      <div class="top-tools">
        <div class="left-tools">
          <div class="menu-container">
            <button id="menuToggle" class="menu-toggle">☰ Menú ▾</button>
            <div class="menu-wrap">
              <ul id="mainMenu" class="menu-dropdown" hidden>
                <li data-submenu="none">Fichar</li>
                <li data-submenu="schedule">Horario</li>
                <li data-submenu="none">Vacaciones y permisos</li>
                <li data-submenu="none">Perfil</li>
                <li data-submenu="none"><a href="gestion.html">Gestión</a></li>
              </ul>
              <ul id="subMenu" class="submenu-dropdown" hidden>
                <li> <a id="horarioPersonal" href="horario_personal.html">Ver horario personal</a></li>
                <li>Ver horario equipo</li>
                <li>Solicitar cambio de horario</li>
                <li>Ver propuestas de horario</li>
              </ul>
            </div>
          </div>
          <div class="browser-icons" aria-hidden="true">
            <button class="icon-btn">←</button>
            <button class="icon-btn">→</button>
            <button class="icon-btn">⌂</button>
          </div>
        </div>
        <div class="search-area">
          <span>🔍</span>
          <input type="text" placeholder="search" aria-label="buscar" />
        </div>
        <button class="help-btn">?</button>
      </div>



      <div class="content-grid">
        <section class="left-zone">
          <article class="notification-card">
            <h2>Notificaciones</h2>
            <p>Leer notificaciones<br />pendientes</p>
            <div class="choice-row">
              <button class="no">No</button>
              <button class="yes">Sí</button>
            </div>
          </article>
        </section>

        <aside class="calendar-panel">
          <div class="calendar-head">
            <strong id="yearText">2026</strong>
            <span id="dateText">Thu, Mar 05</span>
          </div>
          <div class="calendar-body">
            <div class="month-bar">
              <button id="prevMonth" aria-label="mes anterior">‹</button>
              <span id="monthLabel">MARCH 2026</span>
              <button id="nextMonth" aria-label="mes siguiente">›</button>
            </div>
            <div class="weekdays" id="weekdays"></div>
            <div class="days-grid" id="daysGrid"></div>
          </div>
          <div class="calendar-actions">
            <button class="cancel">CANCEL</button>
            <button class="ok">OK</button>
          </div>
        </aside>
      </div>
    </section>
  </main>
  <script src="common.js"></script>
  <script src="app.js"></script>
</body>

</html>
